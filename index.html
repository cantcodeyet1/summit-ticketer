<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Lawyers Toastmasters Club Launch Check-in</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#004165;--surface:#004f7a;--border:#006094;--text:#f0ebe0;--muted:#7aabbf;--accent:#f2df74;--teal:#006094;--green:#00c853;--green-bg:#002918;--red:#e53935;--red-bg:#2b0808;--amber:#f2df74}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#004165 0%,#006094 100%);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;color:var(--text)}
header{padding:14px 20px 12px;background:var(--surface);border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;flex-direction:column;gap:1px}
.logo-top{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--accent);text-transform:uppercase}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
#start-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;gap:32px;text-align:center}
.start-logo{width:72px;height:72px;object-fit:contain;opacity:.9}
.start-event{display:flex;flex-direction:column;gap:8px}
.start-title{font-family:'Montserrat',sans-serif;font-size:clamp(20px,6vw,28px);font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text);line-height:1.15}
.start-tagline{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase}
.start-meta{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em}
.start-btn{background:var(--accent);border:none;border-radius:14px;padding:18px 48px;color:#07222a;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.start-btn:active{opacity:.8}
#scanner-screen{flex:1;display:none;flex-direction:column}
.session-bar{padding:10px 20px;background:var(--surface);border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.session-bar .lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
.session-bar .nm{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;color:var(--accent)}
.change-btn{background:var(--teal);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:background .15s}
.change-btn:active{background:var(--border)}
.change-btn.active{background:var(--accent);color:#07222a;border-color:var(--accent)}
.camera-wrap{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas{display:none}
.viewfinder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.vf-box{width:220px;height:220px;position:relative}
.vf-box::before,.vf-box::after,.vf-tl::before,.vf-tl::after{content:'';position:absolute;width:32px;height:32px;border-color:var(--accent);border-style:solid}
.vf-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:3px 0 0 0}
.vf-box::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 3px 0 0}
.vf-tl::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 3px}
.vf-tl::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 3px 0}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanline 2s ease-in-out infinite;top:4px}
@keyframes scanline{0%{top:4px;opacity:1}45%{top:calc(100% - 6px);opacity:1}50%{opacity:0}55%{top:4px;opacity:0}60%{opacity:1}100%{top:calc(100% - 6px);opacity:1}}
.hint{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;background:rgba(7,34,42,.8);padding:7px 0}
#result-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:32px}
#result-overlay.approved{background:linear-gradient(160deg,#002918,#083a30)}
#result-overlay.denied{background:linear-gradient(160deg,#2b0808,#1a0010)}
#result-overlay.unknown{background:linear-gradient(160deg,#1a1200,#0d2a30)}
.r-icon{font-size:72px;margin-bottom:16px;animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.r-status{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;padding:4px 14px;border-radius:20px;display:inline-block}
.approved .r-status{color:#07222a;background:var(--green)}
.denied .r-status{color:#fff;background:var(--red)}
.unknown .r-status{color:#07222a;background:var(--amber)}
.r-name{font-family:'Montserrat',sans-serif;font-size:clamp(16px,5vw,26px);font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:.02em;word-break:break-word;overflow-wrap:break-word;max-width:100%}
.r-detail{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;word-break:break-word;overflow-wrap:break-word;max-width:100%}
.r-tap{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.stats-bar{padding:10px 20px;background:var(--surface);border-bottom:2px solid var(--accent);display:flex;gap:20px;flex-shrink:0}
.stat{display:flex;align-items:baseline;gap:5px}
.stat-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.g{color:var(--green)}.r{color:var(--red)}
.stat-label{font-size:11px;color:var(--muted)}
#manual-wrap{display:none;padding:20px;flex-direction:column;gap:12px}
.manual-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;text-align:center}
.check-btn{background:var(--accent);border:none;border-radius:10px;padding:14px;color:#07222a;font-size:15px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;width:100%;letter-spacing:.05em;text-transform:uppercase}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-top">Lawyers Toastmasters Club</div>
    <div class="logo-sub">Club Launch · 27 June 2026</div>
  </div>
</header>

<div id="start-screen">
  <img class="start-logo" src="assets/toastmasters-logo.png" alt="Toastmasters" />
  <div class="start-event">
    <div class="start-title">Lawyers<br>Toastmasters Club</div>
    <div class="start-tagline">Club Launch</div>
    <div class="start-meta">27 June 2026 · 09:00 AM</div>
  </div>
  <button class="start-btn" onclick="startScanning()">Start Scanning</button>
</div>

<div id="scanner-screen">
  <div class="session-bar">
    <div><div class="lbl">Scanning for</div><div class="nm" id="active-name">—</div></div>
    <div style="display:flex;gap:8px">
      <button class="change-btn" id="manual-toggle" onclick="toggleManual()">⌨</button>
      <button class="change-btn" onclick="goHome()">⌂</button>
    </div>
  </div>
  <div id="manual-panel" style="display:none;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);gap:8px;flex-direction:column">
    <div style="display:flex;gap:8px">
      <input type="text" class="manual-input" id="manual-code" placeholder="Email address…" style="flex:1;padding:10px 14px;font-size:13px" onkeydown="if(event.key==='Enter')checkManual()" />
      <button class="check-btn" onclick="checkManual()" style="width:auto;padding:10px 18px;font-size:13px">Go</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num g" id="cnt-ok">0</span><span class="stat-label">checked in</span></div>
    <div class="stat" style="margin-left:auto"><span class="stat-num" id="cnt-tot" style="color:var(--muted)">—</span><span class="stat-label">expected</span></div>
  </div>
  <div class="camera-wrap" id="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="viewfinder"><div class="vf-box"><div class="vf-tl"></div><div class="scan-line"></div></div></div>
    <div class="hint" id="hint">Hold QR code in frame</div>
  </div>
  <div id="manual-wrap">
    <input type="text" class="manual-input" id="manual-code" placeholder="Type attendee email..." />
    <button class="check-btn" onclick="checkManual()">Check in</button>
  </div>
</div>

<div id="result-overlay" onclick="dismiss()">
  <div class="r-icon" id="r-icon">✓</div>
  <div class="r-status" id="r-status">APPROVED</div>
  <div class="r-name" id="r-name">Jane Smith</div>
  <div class="r-detail" id="r-detail">Session</div>
  <div class="r-tap">Tap to continue scanning</div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbx_FUw_ZyB83FYqC5n3USeylLkzir4LAIGiidTx3GAcrzZNG3CMgVsJ9jz5ZY414B6y/exec';
var activeSession = null;
var scanning = false;
var stream = null;
var timer = null;
var cntOk = 0;
var totalExpected = 0;
var _video = null;
var _canvas = null;
var _ctx = null;
var _lastTick = 0;
var SCAN_INTERVAL = 50;
var _detector = (typeof BarcodeDetector !== 'undefined')
  ? new BarcodeDetector({formats: ['qr_code']})
  : null;
var _lastCode = null;
var _lastCodeTime = 0;
var CODE_COOLDOWN = 10000;

var SESSION_NAME = 'Club Launch';

function startScanning() {
  activeSession = SESSION_NAME;
  cntOk = 0; totalExpected = 0;
  document.getElementById('active-name').textContent = SESSION_NAME;
  document.getElementById('cnt-ok').textContent = '0';
  document.getElementById('cnt-tot').textContent = '—';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('scanner-screen').style.display = 'flex';
  document.querySelector('header').style.display = 'none';
  startCam();
  fetch(API + '?action=count&session=' + encodeURIComponent(SESSION_NAME))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.total !== undefined) totalExpected = d.total;
      if (d.checkedIn !== undefined) { cntOk = d.checkedIn; document.getElementById('cnt-ok').textContent = cntOk; }
      updateExpected();
    })
    .catch(function(){});
}

function updateExpected() {
  document.getElementById('cnt-tot').textContent = Math.max(0, totalExpected - cntOk);
}

function goHome() {
  stopCam();
  document.getElementById('result-overlay').style.display = 'none';
  document.getElementById('scanner-screen').style.display = 'none';
  document.querySelector('header').style.display = '';
  document.getElementById('start-screen').style.display = 'flex';
}

function setHint(msg) {
  document.getElementById('hint').textContent = msg;
}

function startCam() {
  _video = document.getElementById('video');
  _canvas = document.getElementById('canvas');
  _ctx = _canvas.getContext('2d');
  setHint('Starting…');

  function beginScanning() {
    if (scanning) return;
    scanning = true;
    setHint('Hold QR code in frame');
    requestAnimationFrame(tick);
  }

  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:3840},height:{ideal:2160}}})
    .then(function(s){
      stream = s;
      _video.srcObject = s;
      _video.addEventListener('loadedmetadata', beginScanning);
      _video.addEventListener('canplay', beginScanning);
      _video.addEventListener('play', beginScanning);
      setTimeout(beginScanning, 2000);
      _video.play().catch(function(e){ setHint('play() failed: ' + e.message); });
      document.getElementById('camera-wrap').style.display = 'flex';
      document.getElementById('manual-wrap').style.display = 'none';
    })
    .catch(function(e){
      setHint('Camera error: ' + e.message);
      document.getElementById('camera-wrap').style.display = 'none';
      document.getElementById('manual-wrap').style.display = 'flex';
    });
}

function stopCam() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
}

var _frameCount = 0;
var _lastHintUpdate = 0;

function tick(ts) {
  if (!scanning) return;
  if (_video.readyState < 2) { requestAnimationFrame(tick); return; }
  if (ts - _lastTick < SCAN_INTERVAL) { requestAnimationFrame(tick); return; }
  _lastTick = ts;

  // Draw frame to canvas regardless of detection method
  var sw = _video.videoWidth, sh = _video.videoHeight;
  if (!sw || !sh) { requestAnimationFrame(tick); return; }
  _frameCount++;

  if (_detector) {
    _detector.detect(_video)
      .then(function(codes) {
        if (!scanning) return;
        if (codes.length > 0) {
          var val = codes[0].rawValue;
          if (val === _lastCode && Date.now() - _lastCodeTime < CODE_COOLDOWN) { requestAnimationFrame(tick); return; }
          scanning = false; lookup(val);
        } else { requestAnimationFrame(tick); }
      })
      .catch(function() {
        _detector = null;
        requestAnimationFrame(tick);
      });
  } else {
    try {
      var scale = Math.min(1, 720 / Math.max(sw, sh));
      var w = Math.round(sw * scale), h = Math.round(sh * scale);
      if (_canvas.width !== w) _canvas.width = w;
      if (_canvas.height !== h) _canvas.height = h;
      _ctx.drawImage(_video, 0, 0, w, h);
      var img = _ctx.getImageData(0, 0, w, h);
      var code = jsQR(img.data, w, h, {inversionAttempts:'attemptBoth'});
      if (code && code.data) {
        if (code.data === _lastCode && Date.now() - _lastCodeTime < CODE_COOLDOWN) { requestAnimationFrame(tick); return; }
        scanning = false; lookup(code.data);
      } else { requestAnimationFrame(tick); }
    } catch(e) {
      requestAnimationFrame(tick);
    }
  }
}

function lookup(code, done) {
  _lastCode = code;
  _lastCodeTime = Date.now();
  fetch(API + '?action=checkin&code=' + encodeURIComponent(code) + '&session=' + encodeURIComponent(activeSession))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (done) done();
      if (d.status === 'approved') {
        cntOk++; document.getElementById('cnt-ok').textContent = cntOk; updateExpected();
        show('approved','✓', d.name, d.detail || activeSession);
      } else if (d.status === 'already') {
        show('unknown','⚠', d.name || 'Already checked in', 'Scanned ' + fmtTime(d.time));
      } else if (d.status === 'walkin') {
        show('denied','✗', d.name || 'Not registered', 'Not in registration list');
      } else {
        show('denied','✗', d.name || 'Not registered', d.reason || 'No ticket for this session');
      }
    })
    .catch(function(){ if (done) done(); show('unknown','!','Connection error','Could not reach Google Sheet'); });
}

function fmtTime(raw) {
  if (!raw) return 'earlier';
  var d = new Date(raw.replace(' ', 'T'));
  if (isNaN(d)) return raw;
  var today = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var isToday = d.getDate()===today.getDate() && d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear();
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  var time = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
  return isToday ? 'Today at ' + time : d.getDate() + ' ' + months[d.getMonth()] + ' at ' + time;
}

function toggleManual() {
  var panel = document.getElementById('manual-panel');
  var open = panel.style.display === 'none';
  panel.style.display = open ? 'flex' : 'none';
  document.getElementById('camera-wrap').style.display = open ? 'none' : 'flex';
  document.getElementById('manual-toggle').classList.toggle('active', open);
  if (open) {
    scanning = false;
    setTimeout(function(){ document.getElementById('manual-code').focus(); }, 50);
  } else {
    scanning = true;
    requestAnimationFrame(tick);
  }
}

function checkManual() {
  var v = document.getElementById('manual-code').value.trim();
  if (!v) return;
  var btn = document.querySelector('#manual-panel .check-btn');
  btn.textContent = '…';
  btn.disabled = true;
  document.getElementById('manual-code').disabled = true;
  lookup(v, function() {
    document.getElementById('manual-code').value = '';
    document.getElementById('manual-code').disabled = false;
    btn.textContent = 'Go';
    btn.disabled = false;
    document.getElementById('manual-panel').style.display = 'none';
    document.getElementById('camera-wrap').style.display = 'flex';
    document.getElementById('manual-toggle').classList.remove('active');
  });
}

function show(type, icon, name, detail) {
  var o = document.getElementById('result-overlay');
  o.className = type; o.style.display = 'flex';
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-status').textContent = type==='approved'?'APPROVED':type==='denied'?'DENIED':'ALREADY IN';
  document.getElementById('r-name').textContent = name;
  document.getElementById('r-detail').textContent = detail;
  if (navigator.vibrate) navigator.vibrate(type==='approved'?[80]:[80,60,80]);
  clearTimeout(timer);
}

function dismiss() {
  clearTimeout(timer);
  document.getElementById('result-overlay').style.display = 'none';
  var count = 2;
  setHint('Next scan in ' + count + 's…');
  var cd = setInterval(function() {
    count--;
    if (count <= 0) {
      clearInterval(cd);
      scanning = true;
      setHint((_detector ? 'Native' : 'jsQR') + ' · scanning…');
      requestAnimationFrame(tick);
    } else {
      setHint('Next scan in ' + count + 's…');
    }
  }, 1000);
}
</script>
</body>
</html>
